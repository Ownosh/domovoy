<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи - Домовой</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="ri-home-5-line icon-logo"></i> Домовой</h2>
            </div>
            
            <ul class="sidebar-nav">
                <li><a href="dashboard.html"><i class="ri-dashboard-line nav-icon"></i> Главная</a></li>
                <li><a href="users.html" class="active"><i class="ri-user-3-line nav-icon"></i> Пользователи</a></li>
                <li><a href="verification.html"><i class="ri-shield-check-line nav-icon"></i> Верификация</a></li>
                <li><a href="requests.html"><i class="ri-file-list-3-line nav-icon"></i> Заявки</a></li>
                <li><a href="news.html"><i class="ri-newspaper-line nav-icon"></i> Новости</a></li>
                <li><a href="notifications.html"><i class="ri-notification-3-line nav-icon"></i> Уведомления</a></li>
            </ul>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">А</div>
                    <div class="user-details">
                        <div class="name" id="userName">Администратор</div>
                        <div class="role">Администратор</div>
                    </div>
                </div>
                    <button class="btn btn-secondary logout-btn" onclick="logout()" style="width: 100%">Выйти</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <h1>Управление пользователями</h1>
            </div>

            <div class="content">
                <!-- Фильтры -->
                <div class="filters">
                    <div class="filter-row">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Поиск по имени, email, телефону..." onkeyup="filterUsers()">
                        </div>
                        
                        <div class="filter-group">
                            <label>Статус верификации</label>
                            <select id="filterVerification" onchange="filterUsers()">
                                <option value="">Все</option>
                                <option value="approved">Верифицирован</option>
                                <option value="pending">Ожидает</option>
                                <option value="rejected">Отклонён</option>
                                <option value="none">Без верификации</option>
                            </select>
                        </div>
                        
                        <div class="filter-group">
                            <label>Статус аккаунта</label>
                            <select id="filterStatus" onchange="filterUsers()">
                                <option value="">Все</option>
                                <option value="active">Активные</option>
                                <option value="blocked">Заблокированные</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Таблица пользователей -->
                <div class="card">
                    <div class="card-header">
                        <h3>Список пользователей
                            <span class="meta"><span id="userCount" class="count">0</span></span>
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>ФИО</th>
                                        <th>Email</th>
                                        <th>Телефон</th>
                                        <th>Квартира</th>
                                        <th>Верификация</th>
                                        <th>Статус</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTable">
                                    <tr>
                                        <td colspan="7" style="text-align: center; padding: 40px;">
                                            <div class="loader"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно просмотра пользователя -->
    <div class="modal" id="viewUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Информация о пользователе</h2>
                <button class="modal-close" onclick="closeModal('viewUserModal')">&times;</button>
            </div>
            <div id="userDetails"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('viewUserModal')">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/data.js"></script>
    <script>
        checkAuth();

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (currentUser) {
            document.getElementById('userName').textContent = currentUser.fullName;
            document.getElementById('userAvatar').textContent = currentUser.fullName.charAt(0);
        }

        let allUsers = [];
        let allVerifications = [];

        async function loadUsers() {
            try {
                const [users, verifications] = await Promise.all([
                    getUsers(),
                    getVerifications()
                ]);
                
                allUsers = users.filter(u => u.role === 'resident');
                allVerifications = verifications;
                
                // Добавляем информацию о верификации к пользователям
                allUsers.forEach(user => {
                    const verification = verifications.find(v => v.userId === user.id || v.userId === user.userId);
                    if (verification) {
                        user.verification = {
                            status: verification.status,
                            apartmentNumber: verification.apartmentNumber,
                            submittedAt: verification.submittedAt
                        };
                    }
                });
                
                displayUsers(allUsers);
            } catch (error) {
                console.error('Ошибка при загрузке пользователей:', error);
                allUsers = [];
                displayUsers([]);
            }
        }

        function displayUsers(users) {
            const tbody = document.getElementById('usersTable');
            document.getElementById('userCount').textContent = users.length;
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px;">Пользователи не найдены</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(user => {
                const verificationStatus = user.verification ? user.verification.status : 'none';
                const apartmentInfo = user.verification ? `кв. ${user.verification.apartmentNumber}` : '-';
                
                return `
                    <tr>
                        <td>${escapeHtml(user.fullName)}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td>${escapeHtml(user.phone || '-')}</td>
                        <td>${apartmentInfo}</td>
                        <td><span class="badge ${getStatusBadgeClass(verificationStatus)}">${getVerificationText(verificationStatus)}</span></td>
                        <td><span class="badge ${user.isBlocked ? 'badge-danger' : 'badge-success'}">${user.isBlocked ? 'Заблокирован' : 'Активен'}</span></td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn btn-primary btn-icon" onclick="viewUser('${user.id}')" title="Просмотр">
                                    <span>🔍</span>
                                </button>
                                <button class="btn ${user.isBlocked ? 'btn-success' : 'btn-warning'} btn-icon" onclick="toggleUserBlock('${user.id}')" title="${user.isBlocked ? 'Разблокировать' : 'Заблокировать'}">
                                    <span>${user.isBlocked ? '🔓' : '🔒'}</span>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getVerificationText(status) {
            const map = {
                'approved': 'Верифицирован',
                'pending': 'Ожидает',
                'rejected': 'Отклонён',
                'none': 'Нет заявки'
            };
            return map[status] || status;
        }

        function filterUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const verificationFilter = document.getElementById('filterVerification').value;
            const statusFilter = document.getElementById('filterStatus').value;

            let filtered = allUsers;

            if (searchTerm) {
                filtered = filtered.filter(user => 
                    user.fullName.toLowerCase().includes(searchTerm) ||
                    user.email.toLowerCase().includes(searchTerm) ||
                    (user.phone && user.phone.includes(searchTerm))
                );
            }

            if (verificationFilter) {
                filtered = filtered.filter(user => {
                    if (verificationFilter === 'none') {
                        return !user.verification;
                    }
                    return user.verification && user.verification.status === verificationFilter;
                });
            }

            if (statusFilter) {
                filtered = filtered.filter(user => {
                    if (statusFilter === 'active') return !user.isBlocked;
                    if (statusFilter === 'blocked') return user.isBlocked;
                    return true;
                });
            }

            displayUsers(filtered);
        }

        async function viewUser(userId) {
            const user = await getUserById(userId);
            if (!user) return;
            
            // Загружаем верификацию для пользователя
            const verifications = await getVerifications();
            const verification = verifications.find(v => v.userId === userId || v.userId === user.userId);
            if (verification) {
                user.verification = {
                    status: verification.status,
                    apartmentNumber: verification.apartmentNumber,
                    submittedAt: verification.submittedAt
                };
            }

            const details = `
                <div class="form-group">
                    <label>ФИО</label>
                    <input type="text" value="${escapeHtml(user.fullName)}" readonly>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" value="${escapeHtml(user.email)}" readonly>
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" value="${escapeHtml(user.phone || '-')}" readonly>
                </div>
                <div class="form-group">
                    <label>Дата регистрации</label>
                    <input type="text" value="${formatDate(user.createdAt)}" readonly>
                </div>
                ${user.verification ? `
                    <div class="form-group">
                        <label>Квартира</label>
                        <input type="text" value="кв. ${escapeHtml(user.verification.apartmentNumber)}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Статус верификации</label>
                        <select disabled style="opacity:0.6">
                            <option value="none" ${!user.verification || user.verification.status === 'none' ? 'selected' : ''}>Нет заявки</option>
                            <option value="pending" ${user.verification.status === 'pending' ? 'selected' : ''}>Ожидает</option>
                            <option value="approved" ${user.verification.status === 'approved' ? 'selected' : ''}>Верифицирован</option>
                            <option value="rejected" ${user.verification.status === 'rejected' ? 'selected' : ''}>Отклонён</option>
                        </select>
                    </div>
                ` : `
                    <div class="form-group">
                        <label>Статус верификации</label>
                        <select disabled style="opacity:0.6">
                            <option value="none" selected>Нет заявки</option>
                        </select>
                    </div>
                `}
                <div class="form-group">
                    <label>Статус аккаунта</label>
                    <select disabled style="opacity:0.6">
                        <option value="active" ${!user.isBlocked ? 'selected' : ''}>Активен</option>
                        <option value="blocked" ${user.isBlocked ? 'selected' : ''}>Заблокирован</option>
                    </select>
                </div>
            `;

            document.getElementById('userDetails').innerHTML = details;
            openModal('viewUserModal');
        }

        async function toggleUserBlock(userId) {
            const user = await getUserById(userId);
            if (!user) return;

            try {
                user.isBlocked = !user.isBlocked;
                await saveUser(user);
                showSuccess(`Пользователь ${user.isBlocked ? 'заблокирован' : 'разблокирован'}`);
                await loadUsers();
            } catch (error) {
                showError('Не удалось обновить статус пользователя');
            }
        }

        (async () => {
            await loadUsers();
        })();
    </script>
</body>
</html>
